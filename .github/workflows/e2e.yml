name: E2E Tests

on:
  pull_request:
    branches: [dev]

# Cancel an in-flight run when a newer commit lands on the same PR. E2E uses
# real preprod wallets; stacking runs causes UTxO contention and burns CI
# minutes on stale commits.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create Neon Database Branch
        id: create-branch
        run: |
          BRANCH_NAME="e2e-ci-pr-${{ github.event.pull_request.number }}-run-${{ github.run_id }}"
          EXPIRES_AT="$(date -u -d '+24 hours' +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Creating database branch: $BRANCH_NAME"
          echo "Branch will expire at (UTC): $EXPIRES_AT"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{
              \"endpoints\": [
                {
                  \"type\": \"read_write\"
                }
              ],
              \"branch\": {
                \"name\": \"$BRANCH_NAME\",
                \"expires_at\": \"$EXPIRES_AT\"
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to create branch. HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          BRANCH_ID=$(echo $BODY | jq -r '.branch.id')
          ENDPOINT_HOST=$(echo $BODY | jq -r '.endpoints[0].host')

          if [ "$BRANCH_ID" = "null" ] || [ -z "$BRANCH_ID" ]; then
            echo "❌ Failed to extract branch ID from response"
            exit 1
          fi

          BASE_URI="${{ secrets.DATABASE_URL }}"
          CONNECTION_URI=$(printf '%s' "$BASE_URI" | sed "s/@[^/]*/@$ENDPOINT_HOST/")

          # GitHub auto-masks raw secret values, but CONNECTION_URI is derived
          # (different host) and still embeds the user:password from
          # DATABASE_URL. Register it explicitly so it stays masked in any
          # downstream log emission.
          echo "::add-mask::$CONNECTION_URI"

          echo "branch_id=$BRANCH_ID" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "connection_uri=$CONNECTION_URI" >> $GITHUB_OUTPUT
          echo "endpoint_host=$ENDPOINT_HOST" >> $GITHUB_OUTPUT

          echo "✅ Database branch created: $BRANCH_NAME"
          echo "✅ Branch ID: $BRANCH_ID"
          echo "✅ Endpoint: $ENDPOINT_HOST"

      - name: Wait for Branch to be Ready
        run: |
          echo "Waiting for branch to be ready..."
          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESPONSE=$(curl -s \
              "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
              -H "Accept: application/json")

            STATUS=$(echo $RESPONSE | jq -r '.branch.current_state')

            if [ "$STATUS" = "ready" ]; then
              echo "✅ Branch is ready!"
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Branch state is '$STATUS', waiting 5 seconds..."
            sleep 5
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Branch failed to become ready within timeout (5 minutes)"
            echo "Last known state: $STATUS"
            exit 1
          fi

      - name: Wait for Postgres endpoint to accept connections
        # Neon reports branch state "ready" before the compute endpoint actually
        # accepts queries (cold-start / wake delay; the wake handshake needs
        # SSL + SNI so a plain TCP probe is not sufficient). Run a real
        # SELECT 1 over the full SSL-enabled connection URI until it succeeds.
        # prisma migrate deploy was failing with P1001 ("Can't reach database
        # server") in this gap.
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null
          export PGCONNECT_TIMEOUT=10
          MAX_ATTEMPTS=60
          ATTEMPT=0
          until psql "${{ steps.create-branch.outputs.connection_uri }}" -tAc 'SELECT 1' >/dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "❌ Postgres endpoint not accepting queries after $MAX_ATTEMPTS attempts"
              psql "${{ steps.create-branch.outputs.connection_uri }}" -tAc 'SELECT 1' || true
              exit 1
            fi
            echo "Postgres not ready yet (attempt $ATTEMPT/$MAX_ATTEMPTS), waiting 5s..."
            sleep 5
          done
          echo "✅ Postgres endpoint accepting queries"

      - name: Generate Prisma Client
        run: pnpm run prisma:generate
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - name: Run Database Migrations
        run: pnpm exec prisma migrate deploy --config prisma/prisma.config.ts
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - name: Seed Database (V1 + V2)
        # Single seed run creates BOTH PaymentSources when the V2 mnemonics
        # are present (the seed gates V2 separately and skips cleanly when the
        # V2 env vars are missing). Downstream V1 and V2 suites run against
        # this one DB + one API server.
        run: pnpm exec prisma db seed --config prisma/prisma.config.ts
        env:
          DATABASE_URL: '${{ steps.create-branch.outputs.connection_uri }}'
          PURCHASE_WALLET_PREPROD_MNEMONIC: '${{ secrets.PURCHASE_WALLET_PREPROD_MNEMONIC }}'
          SELLING_WALLET_PREPROD_MNEMONIC: '${{ secrets.SELLING_WALLET_PREPROD_MNEMONIC }}'
          # V2 mnemonics MUST be distinct from V1 mnemonics: HotWallet.walletVkey
          # is globally unique, so reusing V1 mnemonics would derive the same
          # vkeys and the V2 seed INSERT would fail with P2002
          # UniqueConstraintViolation. Distinct wallets also avoid UTxO
          # contention since V1 and V2 e2e suites both run against the same
          # on-chain network in this shared-setup configuration.
          PURCHASE_WALLET_V2_PREPROD_MNEMONIC: '${{ secrets.PURCHASE_WALLET_V2_PREPROD_MNEMONIC }}'
          SELLING_WALLET_V2_PREPROD_MNEMONIC: '${{ secrets.SELLING_WALLET_V2_PREPROD_MNEMONIC }}'
          COLLECTION_WALLET_V2_PREPROD_ADDRESS: '${{ secrets.COLLECTION_WALLET_V2_PREPROD_ADDRESS }}'
          BLOCKFROST_API_KEY_PREPROD: '${{ secrets.BLOCKFROST_API_KEY_PREPROD }}'
          ENCRYPTION_KEY: '${{ secrets.ENCRYPTION_KEY }}'
          ADMIN_KEY: '${{ secrets.ADMIN_KEY }}'

      - name: Start API Server
        run: |
          echo "Starting API server..."
          # Pipe through tee so each line is flushed to disk immediately
          # rather than buffered (Node buffers stdout when piped). $! after
          # the background pipeline returns the PID of the LAST command in
          # the pipeline (tee). We need the tsx PID for kill; capture it via
          # process substitution instead.
          pnpm exec tsx ./src/index.ts > >(tee server.log) 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo "$SERVER_PID" > server.pid

        env:
          DATABASE_URL: '${{ steps.create-branch.outputs.connection_uri }}'
          ENCRYPTION_KEY: '${{ secrets.ENCRYPTION_KEY }}'
          NODE_ENV: 'test'
          PORT: 3001

      - name: Wait for Server Ready
        run: |
          echo "Waiting for server to start..."
          # Continuously poll health endpoint until ready or timeout
          pnpm exec wait-on http://127.0.0.1:3001/api/v1/health -t 180000 --interval 2000 || {
            echo "=== Server failed to become healthy ==="
            if [ -f server.pid ]; then
              echo "Process status:"
              ps -p "$(cat server.pid)" -o pid,cmd || true
            fi
            echo "=== Full server log ==="
            cat server.log
            exit 1
          }
          echo "=== Server is responding, recent log tail ==="
          tail -50 server.log || true

      - name: Run E2E Suite
        # Single jest invocation runs both V1 and V2 flows. The shared
        # `globalSetup` discovers every PaymentSource the API exposes and
        # registers one agent per source type in parallel, so V1 and V2
        # registrations happen concurrently. The flow tests then iterate over
        # both source types via `describe.each`.
        run: pnpm run test:e2e
        env:
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_API_URL: http://127.0.0.1:3001
          TEST_NETWORK: Preprod
          TEST_TIMEOUT_REGISTRATION: 1800000
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}
          BLOCKFROST_API_KEY_PREPROD: ${{ secrets.BLOCKFROST_API_KEY_PREPROD }}

      - name: Stop API server for log flush
        if: always()
        run: |
          # Send SIGTERM, wait briefly, then SIGKILL if needed. This gives
          # winston / stdout a chance to flush any buffered log lines BEFORE
          # we dump the file.
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            if kill -0 "$PID" 2>/dev/null; then
              kill -TERM "$PID" 2>/dev/null || true
              for i in 1 2 3 4 5; do
                if ! kill -0 "$PID" 2>/dev/null; then break; fi
                sleep 1
              done
              kill -KILL "$PID" 2>/dev/null || true
            fi
          fi
          sleep 1

      - name: Dump server log
        if: always()
        run: |
          if [ ! -f server.log ]; then
            echo "server.log not present"
            exit 0
          fi
          LINES=$(wc -l < server.log || echo 0)
          echo "=== server.log total $LINES lines ==="
          echo "=== server.log full contents (with line numbers) ==="
          nl -ba server.log || cat server.log
          echo "=== end server.log ==="
          echo ""
          echo "=== errors and warnings (grep) ==="
          grep -E '"level":"(error|warn)"|RegistrationFailed|Failed to|Error registering|interpretBlockchainError' server.log | tail -200 || true
          echo "=== end grep ==="

      - name: Upload server.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ github.run_id }}
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Final cleanup of API Server pidfile
        if: always()
        run: |
          # Server is already stopped above; this just clears the pidfile.
          rm -f server.pid

      - name: Delete Neon Database Branch
        if: always() && steps.create-branch.outputs.branch_id != ''
        run: |
          echo "Deleting database branch: ${{ steps.create-branch.outputs.branch_name }}"
          DELETE_RESPONSE=$(curl -s -w "\n%{http_code}" -X DELETE \
            "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }}" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Accept: application/json")
          DELETE_CODE=$(echo "$DELETE_RESPONSE" | tail -n1)
          if [ "$DELETE_CODE" = "200" ] || [ "$DELETE_CODE" = "202" ]; then
            echo "✅ Branch deleted (HTTP $DELETE_CODE)"
          else
            echo "⚠️ Branch delete returned HTTP $DELETE_CODE (auto-expiry at 24h will clean up)"
            echo "$DELETE_RESPONSE" | sed '$d'
          fi
