name: E2E Tests

on:
  pull_request:
    branches: [dev]

# Cancel an in-flight run when a newer commit lands on the same PR. E2E uses
# real preprod wallets; stacking runs causes UTxO contention and burns CI
# minutes on stale commits.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Create Neon Database Branch
        id: create-branch
        run: |
          BRANCH_NAME="e2e-ci-pr-${{ github.event.pull_request.number }}-run-${{ github.run_id }}"
          EXPIRES_AT="$(date -u -d '+24 hours' +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Creating database branch: $BRANCH_NAME"
          echo "Branch will expire at (UTC): $EXPIRES_AT"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d "{
              \"endpoints\": [
                {
                  \"type\": \"read_write\"
                }
              ],
              \"branch\": {
                \"name\": \"$BRANCH_NAME\",
                \"expires_at\": \"$EXPIRES_AT\"
              }
            }")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "❌ Failed to create branch. HTTP Status: $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          BRANCH_ID=$(echo $BODY | jq -r '.branch.id')
          ENDPOINT_HOST=$(echo $BODY | jq -r '.endpoints[0].host')

          if [ "$BRANCH_ID" = "null" ] || [ -z "$BRANCH_ID" ]; then
            echo "❌ Failed to extract branch ID from response"
            exit 1
          fi

          BASE_URI="${{ secrets.DATABASE_URL }}"
          CONNECTION_URI=$(printf '%s' "$BASE_URI" | sed "s/@[^/]*/@$ENDPOINT_HOST/")

          # GitHub auto-masks raw secret values, but CONNECTION_URI is derived
          # (different host) and still embeds the user:password from
          # DATABASE_URL. Register it explicitly so it stays masked in any
          # downstream log emission.
          echo "::add-mask::$CONNECTION_URI"

          echo "branch_id=$BRANCH_ID" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "connection_uri=$CONNECTION_URI" >> $GITHUB_OUTPUT
          echo "endpoint_host=$ENDPOINT_HOST" >> $GITHUB_OUTPUT

          echo "✅ Database branch created: $BRANCH_NAME"
          echo "✅ Branch ID: $BRANCH_ID"
          echo "✅ Endpoint: $ENDPOINT_HOST"

      - name: Wait for Branch to be Ready
        run: |
          echo "Waiting for branch to be ready..."
          MAX_ATTEMPTS=60
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            RESPONSE=$(curl -s \
              "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }}" \
              -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
              -H "Accept: application/json")

            STATUS=$(echo $RESPONSE | jq -r '.branch.current_state')

            if [ "$STATUS" = "ready" ]; then
              echo "✅ Branch is ready!"
              break
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Branch state is '$STATUS', waiting 5 seconds..."
            sleep 5
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "❌ Branch failed to become ready within timeout (5 minutes)"
            echo "Last known state: $STATUS"
            exit 1
          fi

      - name: Wait for Postgres endpoint to accept connections
        # Neon reports branch state "ready" before the compute endpoint actually
        # accepts queries (cold-start / wake delay; the wake handshake needs
        # SSL + SNI so a plain TCP probe is not sufficient). Run a real
        # SELECT 1 over the full SSL-enabled connection URI until it succeeds.
        # prisma migrate deploy was failing with P1001 ("Can't reach database
        # server") in this gap.
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client >/dev/null
          export PGCONNECT_TIMEOUT=10
          MAX_ATTEMPTS=60
          ATTEMPT=0
          until psql "${{ steps.create-branch.outputs.connection_uri }}" -tAc 'SELECT 1' >/dev/null 2>&1; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "❌ Postgres endpoint not accepting queries after $MAX_ATTEMPTS attempts"
              psql "${{ steps.create-branch.outputs.connection_uri }}" -tAc 'SELECT 1' || true
              exit 1
            fi
            echo "Postgres not ready yet (attempt $ATTEMPT/$MAX_ATTEMPTS), waiting 5s..."
            sleep 5
          done
          echo "✅ Postgres endpoint accepting queries"

      - name: Generate Prisma Client
        run: pnpm run prisma:generate
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - name: Run Database Migrations
        run: pnpm exec prisma migrate deploy --config prisma/prisma.config.ts
        env:
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}

      - name: Seed Database (V1 + V2)
        # Single seed run creates BOTH PaymentSources when the V2 mnemonics
        # are present (the seed gates V2 separately and skips cleanly when the
        # V2 env vars are missing). Downstream V1 and V2 suites run against
        # this one DB + one API server.
        run: pnpm exec prisma db seed --config prisma/prisma.config.ts
        env:
          DATABASE_URL: '${{ steps.create-branch.outputs.connection_uri }}'
          PURCHASE_WALLET_PREPROD_MNEMONIC: '${{ secrets.PURCHASE_WALLET_PREPROD_MNEMONIC }}'
          SELLING_WALLET_PREPROD_MNEMONIC: '${{ secrets.SELLING_WALLET_PREPROD_MNEMONIC }}'
          # V2 mnemonics MUST be distinct from V1 mnemonics: HotWallet.walletVkey
          # is globally unique, so reusing V1 mnemonics would derive the same
          # vkeys and the V2 seed INSERT would fail with P2002
          # UniqueConstraintViolation. Distinct wallets also avoid UTxO
          # contention since V1 and V2 e2e suites both run against the same
          # on-chain network in this shared-setup configuration.
          PURCHASE_WALLET_V2_PREPROD_MNEMONIC: '${{ secrets.PURCHASE_WALLET_V2_PREPROD_MNEMONIC }}'
          SELLING_WALLET_V2_PREPROD_MNEMONIC: '${{ secrets.SELLING_WALLET_V2_PREPROD_MNEMONIC }}'
          COLLECTION_WALLET_V2_PREPROD_ADDRESS: '${{ secrets.COLLECTION_WALLET_V2_PREPROD_ADDRESS }}'
          BLOCKFROST_API_KEY_PREPROD: '${{ secrets.BLOCKFROST_API_KEY_PREPROD }}'
          ENCRYPTION_KEY: '${{ secrets.ENCRYPTION_KEY }}'
          ADMIN_KEY: '${{ secrets.ADMIN_KEY }}'

      - name: Start API Server
        run: |
          echo "Starting API server..."
          # We want each log line flushed to disk immediately (Node buffers
          # stdout when it sees a non-tty destination), AND we want a
          # well-defined PID for the tsx process so teardown's SIGTERM
          # actually reaches the API server.
          #
          # Process substitution (`cmd > >(tee server.log) 2>&1 &`) does NOT
          # reliably leave `$!` pointing at `cmd` — depending on the bash
          # build, `$!` can resolve to the `tee` subshell instead, which
          # means our teardown step kills `tee` (orphaning the API) and the
          # file never sees the final flush. The previous comment in this
          # script claimed `$!` was tsx, but the runtime behavior on
          # ubuntu-latest (bash 5.x) is the opposite for this exact form.
          #
          # Fix: use an explicit named pipe. `tee` reads from the fifo, tsx
          # writes to it. The two backgrounds are separate jobs, so `$!`
          # after each is unambiguous, and we record both PIDs so teardown
          # can terminate them in order (tsx first → fifo writer closes →
          # tee gets EOF → tee flushes server.log → tee exits).
          mkfifo server.fifo
          tee server.log < server.fifo &
          TEE_PID=$!
          echo "$TEE_PID" > tee.pid
          pnpm exec tsx ./src/index.ts > server.fifo 2>&1 &
          SERVER_PID=$!
          echo "$SERVER_PID" > server.pid
          echo "Server PID: $SERVER_PID (tee PID: $TEE_PID)"

        env:
          DATABASE_URL: '${{ steps.create-branch.outputs.connection_uri }}'
          ENCRYPTION_KEY: '${{ secrets.ENCRYPTION_KEY }}'
          NODE_ENV: 'test'
          PORT: 3001

      - name: Wait for Server Ready
        run: |
          echo "Waiting for server to start..."
          # Continuously poll health endpoint until ready or timeout
          pnpm exec wait-on http://127.0.0.1:3001/api/v1/health -t 180000 --interval 2000 || {
            echo "=== Server failed to become healthy ==="
            if [ -f server.pid ]; then
              echo "Process status:"
              ps -p "$(cat server.pid)" -o pid,cmd || true
            fi
            echo "=== Full server log ==="
            cat server.log
            exit 1
          }
          echo "=== Server is responding, recent log tail ==="
          tail -50 server.log || true

      - name: Run V1 + V2 E2E in parallel
        # Spawn ONE jest invocation per source type and run them concurrently
        # against the shared API server + DB. The describe.each cases in each
        # test file filter on `TEST_PAYMENT_SOURCE_TYPE`, so each invocation
        # only runs its own iteration — V1 + V2 progress simultaneously
        # instead of sequentially. Disjoint wallets (HotWallet.walletVkey
        # uniqueness enforced at seed) prevent on-chain contention. The
        # shared scheduler in the API server already processes both source
        # types concurrently.
        #
        # Each invocation's stdout/stderr is sed-tagged `[V1] `/`[V2] ` so
        # interleaved output is readable. Exit code is captured via a
        # sentinel line written by the subshell so the pipeline (which exits
        # with sed's status, not jest's) doesn't mask jest failures.
        run: |
          set +e

          # NOTE on `$!` semantics here: `(subshell) | sed > log &` is one
          # backgrounded pipeline, and `$!` returns the PID of the LAST
          # command in that pipeline (sed), NOT the subshell that runs
          # jest. We don't use PID_V*  for anything except `wait`, and
          # `wait` on sed implicitly waits for the whole pipeline to
          # drain (sed sees EOF on its stdin only after the subshell
          # closes its write end, i.e. only after jest has exited), so
          # the captured PID is sufficient HERE.
          #
          # If a future change ever needs to send a signal directly to
          # jest (e.g. graceful cancellation, time-bounded kill), this
          # PID is wrong — use a fifo-based redirect like the API server
          # step above so `$!` after the `pnpm exec jest` invocation is
          # unambiguously the jest PID.
          (
            TEST_PAYMENT_SOURCE_TYPE=Web3CardanoV1 pnpm exec jest \
              --config jest.e2e.config.ts --bail --forceExit 2>&1
            echo "__E2E_EXIT__=$?"
          ) | sed -u 's/^/[V1] /' > v1.log &
          PID_V1=$!

          (
            TEST_PAYMENT_SOURCE_TYPE=Web3CardanoV2 pnpm exec jest \
              --config jest.e2e.config.ts --bail --forceExit 2>&1
            echo "__E2E_EXIT__=$?"
          ) | sed -u 's/^/[V2] /' > v2.log &
          PID_V2=$!

          wait $PID_V1
          wait $PID_V2

          echo "=== V1 e2e log ==="
          cat v1.log
          echo "=== V2 e2e log ==="
          cat v2.log

          EXIT_V1=$(grep -oE '__E2E_EXIT__=[0-9]+' v1.log | tail -1 | cut -d= -f2)
          EXIT_V2=$(grep -oE '__E2E_EXIT__=[0-9]+' v2.log | tail -1 | cut -d= -f2)
          echo "V1 exit: ${EXIT_V1:-missing}"
          echo "V2 exit: ${EXIT_V2:-missing}"

          if [ "$EXIT_V1" != "0" ] || [ "$EXIT_V2" != "0" ]; then
            exit 1
          fi
        env:
          TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
          TEST_API_URL: http://127.0.0.1:3001
          TEST_NETWORK: Preprod
          TEST_TIMEOUT_REGISTRATION: 1800000
          DATABASE_URL: ${{ steps.create-branch.outputs.connection_uri }}
          BLOCKFROST_API_KEY_PREPROD: ${{ secrets.BLOCKFROST_API_KEY_PREPROD }}

      - name: Stop API server for log flush
        if: always()
        run: |
          # Send SIGTERM to tsx (server.pid). On exit, the fifo writer closes
          # → tee gets EOF and flushes server.log → tee exits on its own.
          # We then wait briefly for tee to drain before falling back to
          # SIGKILL. Order matters: killing tee first would leave tsx
          # writing into a broken pipe (SIGPIPE) and abort it without a
          # clean shutdown.
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            if kill -0 "$PID" 2>/dev/null; then
              kill -TERM "$PID" 2>/dev/null || true
              for i in 1 2 3 4 5; do
                if ! kill -0 "$PID" 2>/dev/null; then break; fi
                sleep 1
              done
              kill -KILL "$PID" 2>/dev/null || true
            fi
          fi
          # Now drain tee. It should exit on its own once the writer end of
          # the fifo closes; bound the wait so a stuck reader doesn't hang
          # the workflow.
          if [ -f tee.pid ]; then
            TEE_PID=$(cat tee.pid)
            for i in 1 2 3 4 5; do
              if ! kill -0 "$TEE_PID" 2>/dev/null; then break; fi
              sleep 1
            done
            kill -KILL "$TEE_PID" 2>/dev/null || true
          fi
          rm -f server.fifo
          sleep 1

      - name: Dump server log
        if: always()
        run: |
          if [ ! -f server.log ]; then
            echo "server.log not present"
            exit 0
          fi
          LINES=$(wc -l < server.log || echo 0)
          echo "=== server.log total $LINES lines ==="
          echo "=== server.log full contents (with line numbers) ==="
          nl -ba server.log || cat server.log
          echo "=== end server.log ==="
          echo ""
          echo "=== errors and warnings (grep) ==="
          grep -E '"level":"(error|warn)"|RegistrationFailed|Failed to|Error registering|interpretBlockchainError' server.log | tail -200 || true
          echo "=== end grep ==="

      - name: Detect V2 batch fallback usage
        # The V2 batch services log "[batch-fallback]" when a batch-builder pass
        # fails and the service falls back to single-item processing. Batching
        # is the design intent; a fallback usually signals a transient chain /
        # blockfrost / scheduler issue (still recoverable on the next tick),
        # but it is worth surfacing so we can investigate why the batch did
        # not land. Emit a GitHub Actions warning annotation per occurrence
        # plus a summary line so the run shows up with a yellow "warning"
        # banner without failing the build.
        if: always()
        run: |
          if [ ! -f server.log ]; then
            echo "server.log not present, skipping batch-fallback scan"
            exit 0
          fi
          COUNT=$(grep -c '\[batch-fallback\]' server.log || true)
          COUNT=${COUNT:-0}
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning title=V2 batch fallback used::$COUNT batch-fallback occurrence(s) detected in server.log — batches degraded to single-item processing. Inspect the dumped log for the preceding error context."
            echo "### V2 batch fallback usage" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**$COUNT occurrence(s)** of \`[batch-fallback]\` in server.log." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Each occurrence means a V2 batch builder pass failed and the service degraded to single-item processing for one item; remaining items wait for the next scheduler tick." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Fallback log lines</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            grep '\[batch-fallback\]' server.log | tail -50 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No V2 batch fallback detected (server.log is clean of [batch-fallback])."
            echo "✅ No V2 batch fallback usage detected." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload server.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ github.run_id }}
          path: server.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload e2e logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ github.run_id }}
          path: |
            v1.log
            v2.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Final cleanup of API Server pidfile
        if: always()
        run: |
          # Server + tee are already stopped above; clear the pidfiles and
          # the fifo so a re-run on the same runner image starts clean.
          rm -f server.pid tee.pid server.fifo

      - name: Delete Neon Database Branch
        if: always() && steps.create-branch.outputs.branch_id != ''
        run: |
          echo "Deleting database branch: ${{ steps.create-branch.outputs.branch_name }}"
          DELETE_RESPONSE=$(curl -s -w "\n%{http_code}" -X DELETE \
            "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/${{ steps.create-branch.outputs.branch_id }}" \
            -H "Authorization: Bearer ${{ secrets.NEON_API_KEY }}" \
            -H "Accept: application/json")
          DELETE_CODE=$(echo "$DELETE_RESPONSE" | tail -n1)
          if [ "$DELETE_CODE" = "200" ] || [ "$DELETE_CODE" = "202" ]; then
            echo "✅ Branch deleted (HTTP $DELETE_CODE)"
          else
            echo "⚠️ Branch delete returned HTTP $DELETE_CODE (auto-expiry at 24h will clean up)"
            echo "$DELETE_RESPONSE" | sed '$d'
          fi
