name: Test-runner
on:
  pull_request:
    branches:
      - dev

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Backend Dependencies
        run: pnpm install

      - name: Install Aiken
        run: |
          # Pinned direct download from the aiken GitHub release — no
          # curl|bash installer script. The version follows the aiken.toml
          # compiler pin; the checksum is pinned here and MUST be updated
          # together with the pin (source: the .sha256 asset next to
          # aiken-x86_64-unknown-linux-musl.tar.gz on the release page).
          # A version bump without a checksum update fails loudly below.
          AIKEN_VERSION="$(sed -nE 's/^compiler = "(v[^"]+)".*/\1/p' smart-contracts/payment-v2/aiken.toml)"
          AIKEN_SHA256="b98c4ccbada5e35f15ba417a52872aeaf0c65998aed77351769ce5fd2506b570" # v1.1.23
          curl -sSfL -o aiken.tar.gz "https://github.com/aiken-lang/aiken/releases/download/${AIKEN_VERSION}/aiken-x86_64-unknown-linux-musl.tar.gz"
          echo "${AIKEN_SHA256}  aiken.tar.gz" | sha256sum -c -
          mkdir -p "$HOME/.aiken/bin"
          tar -xzf aiken.tar.gz --strip-components=1 -C "$HOME/.aiken/bin" aiken-x86_64-unknown-linux-musl/aiken
          rm aiken.tar.gz
          echo "$HOME/.aiken/bin" >> "$GITHUB_PATH"

      - name: Check V2 smart contracts
        run: bash scripts/check-v2-contracts.sh

      - name: Generate Prisma Client
        run: pnpm run prisma:generate

      - name: Run Jest
        run: pnpm run test

      - name: Run Build
        run: pnpm run build

      - name: Run Open API Generator
        run: pnpm run swagger-json

      - name: Run Backend ESLint
        run: pnpm run lint:backend

      - name: Run Backend TypeScript Check
        run: pnpm run typecheck:backend

      - name: Install Frontend Dependencies
        run: cd frontend && pnpm install

      - name: Generate OpenAPI Types
        run: cd frontend && pnpm run openapi-ts-latest

      - name: Run Frontend ESLint
        run: pnpm -C frontend run lint

      - name: Run Frontend TypeScript Check
        run: pnpm run typecheck:frontend

      - name: Run Next Build
        run: cd frontend && pnpm run build
